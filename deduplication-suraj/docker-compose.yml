version: "3.8"

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data:
  minio_data:
  rabbitmq_data:

services:
  # --- INFRASTRUCTURE ROUTER (MAIN NGINX) ---
  nginx:
    image: nginx:alpine
    container_name: omnivision_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    networks:
      - app_network

  # --- DOCKERIZED FRONTEND CONTAINER APP ---
  frontend_app:
    build:
      context: ../../omnivision-frontend # Builds locally to avoid the "pull access denied" error
      dockerfile: Dockerfile
    container_name: omnivision_frontend
    restart: always
    networks:
      - app_network

  # --- DOCKERIZED NODE.JS BACKEND ---
  # Added this so your senior's Nginx config can route to http://billion-eye-backend:5000/
  billion-eye-backend:
    build:
      context: ../billion-eye-backend-suraj
      dockerfile: Dockerfile
    container_name: billion-eye-backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/BillionEyes_V1
      - RABBITMQ_HOST=rabbitmq
      - JWT_PRIVATE_KEY=your_super_secret_jwt_key_here_change_in_production
    networks:
      - app_network

  # --- YOLO VALIDATION WORKER ---
  app:
    image: dibyatman/docker_yolo_validatation-app:V1.1 
    container_name: yolo_app
    env_file: 
      - .env
    depends_on:
      - mongodb
      - rabbitmq
      - minio
      - deduplication_services
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    command: python /app/optimize_yolo_mongodb.py
    networks:
      - app_network

  # --- VLM OBJECT DETECTION SERVICE ---
  vlm_object_detection:
    image: samssahu/vlmobject-detection:latest
    container_name: vlm_object_detection
    restart: always
    environment:
      - QUEUE_NAME=vlm_queue
      - RABBITMQ_HOST=rabbitmq
      - MONGO_HOST=mongodb
      - MINIO_HOST=minio
    depends_on:
      - rabbitmq
      - mongodb
      - minio
    networks:
      - app_network
      
  # --- DATA STORAGE CORE (MONGODB) ---
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    logging:
      driver: "none"
    networks:
      - app_network

  # --- MESSAGE BROKER (RABBITMQ) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq_config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # --- OBJECT MEDIA STORAGE CORE (MINIO) ---
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # --- CIVIC RECORD DEDUPLICATION PIPELINE ---
  deduplication_services:
    image: ashpikachu2001/deduplication_services:V1.4
    container_name: deduplication_services
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network
    tty: true
