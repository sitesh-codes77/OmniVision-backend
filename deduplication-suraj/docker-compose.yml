version: "3.8"

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data:
  minio_data:
  rabbitmq_data:

services:
  # --- INFRASTRUCTURE ROUTER (MAIN NGINX) ---
  nginx:
    image: nginx:alpine
    container_name: omnivision_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    networks:
      - app_network

  # --- DOCKERIZED FRONTEND CONTAINER APP ---
  frontend_app:
    image: codevault07/omnivision-frontend:latest # Or build it inline via git clone on the server
    container_name: omnivision_frontend
    restart: always
    networks:
      - app_network

  # --- YOLO VALIDATION WORKER ---
  app:
    image: dibyatman/docker_yolo_validatation-app:V1.1 
    container_name: yolo_app
    env_file: 
      - .env
    depends_on:
      - mongodb
      - rabbitmq
      - minio
      - deduplication_services
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    command: python /app/optimize_yolo_mongodb.py
    networks:
      - app_network

  # --- VLM OBJECT DETECTION SERVICE ---
  vlm_object_detection:
    image: samssahu/vlmobject-detection:latest
    container_name: vlm_object_detection
    restart: always
    environment:
      - QUEUE_NAME=vlm_queue
      - RABBITMQ_HOST=rabbitmq
      - MONGO_HOST=mongodb
      - MINIO_HOST=minio
    depends_on:
      - rabbitmq
      - mongodb
      - minio
    networks:
      - app_network
      
  # --- DATA STORAGE CORE (MONGODB) ---
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017" # Exposed to the host so your PM2 Node server can connect natively
    volumes:
      - mongo_data:/data/db
    logging:
      driver: "none"
    networks:
      - app_network

  # --- MESSAGE BROKER (RABBITMQ) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Exposed to the host so PM2 can drop incident messages natively
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq_config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # --- OBJECT MEDIA STORAGE CORE (MINIO) ---
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

  # --- CIVIC RECORD DEDUPLICATION PIPELINE ---
  deduplication_services:
    image: ashpikachu2001/deduplication_services:V1.4
    container_name: deduplication_services
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network
    tty: true