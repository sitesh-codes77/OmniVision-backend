events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name neuradyne.in www.neuradyne.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name neuradyne.in www.neuradyne.in;

        ssl_certificate /etc/letsencrypt/live/neuradyne.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neuradyne.in/privkey.pem;

        # 1. Route frontend requests directly to your new frontend Docker container
        location /omnivison-app/ {
            proxy_pass http://frontend_app:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Route API requests directly to your host machine's native PM2 Node process
        location /backend/ {
            proxy_pass http://172.17.0.1:5000/; # ⚠️ 172.17.0.1 bridges back to your host VM loop
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path / /;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}