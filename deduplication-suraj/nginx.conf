events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Universal performance tweaks
    sendfile        on;
    keepalive_timeout  65;

    # --- HTTP: Redirects All Unencrypted Web Traffic to HTTPS ---
    server {
        listen 80;
        server_name neuradyne.in www.neuradyne.in;

        # Web endpoint validation target for Let's Encrypt SSL Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: Secure Domain Reverse Proxy Server ---
    server {
        listen 443 ssl;
        server_name neuradyne.in www.neuradyne.in;

        # Production Paths to your SSL Certificates on the Host VPS Disk
        ssl_certificate /etc/letsencrypt/live/neuradyne.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neuradyne.in/privkey.pem;

        # Optimized SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 1. Route API requests directly to the PM2 Node.js process running on the host
        location /backend/ {
            proxy_pass http://172.17.0.1:5000/; # ⚠️ 172.17.0.1 targets the host loopback from inside Docker
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fix cookie path mappings for httpOnly authentication tracking
            proxy_cookie_path / /;
        }

        # 2. Reverse Proxy your subdirectory path to your permanent production Vercel App
        location /omnivison-app/ {
            proxy_pass https://omni-vision-frontend.vercel.app/omnivison-app/;
            proxy_set_header Host omni-vision-frontend.vercel.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Tells Vercel to look for your custom domain handshake
            proxy_ssl_server_name on;
        }

        # 3. Handle default root path mapping rules (Your main landing domain placeholder)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}