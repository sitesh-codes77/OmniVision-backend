events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- HTTP → HTTPS REDIRECT ---
    server {
        listen 80;
        server_name neuradyne.in www.neuradyne.in omnivision.neuradyne.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- MAIN DOMAIN ---
    server {
        listen 443 ssl;
        server_name neuradyne.in www.neuradyne.in;

        ssl_certificate     /etc/letsencrypt/live/neuradyne.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neuradyne.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }

    # --- OMNIVISION SUBDOMAIN ---
    server {
        listen 443 ssl;
        server_name omnivision.neuradyne.in;

        ssl_certificate     /etc/letsencrypt/live/neuradyne.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neuradyne.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend
        location / {
            proxy_pass         http://frontend_app:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Backend API
        location /backend/ {
            proxy_pass         http://billion-eye-backend:5000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cookie_path  /                 /;

            # Critical for AI agents — they take time
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
        }
    }
}